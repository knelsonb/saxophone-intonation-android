name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Expo prebuild (generates android/)
        run: npx expo prebuild --platform android --non-interactive

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}

      - name: Build release APK
        # No signing config is supplied here, so Gradle falls back to the
        # debug keystore. That's fine for installs from a GitHub release —
        # Tom enables "Install from unknown sources" once and we're done.
        # Chunk 5 will add a real upload key for the Play Store.
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)
          cp "$SRC" "intonation-analyzer-v${VERSION}-android.apk"
          ls -la *.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: intonation-analyzer-v*-android.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
